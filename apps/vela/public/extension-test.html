<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vela Extension Test Fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1f2933;
        background: #f6f8fb;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .hint {
        margin: 0 0 28px;
        color: #52606d;
      }

      .sample {
        padding: 20px;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        background: #ffffff;
        font-size: 18px;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vela Extension Test Fixture</h1>
      <p class="hint">Select a sentence, right-click, then choose Add vocab to Vela.</p>
      <div class="sample">
        <p>今日は新しい単語を三つ覚えました。</p>
        <p>明日の朝、図書館で日本語の本を読みます。</p>
        <p>この文章は拡張機能の保存テストに使います。</p>
      </div>
    </main>
  </body>
</html>
