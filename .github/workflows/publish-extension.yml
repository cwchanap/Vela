name: Publish Extension

on:
  push:
    branches: [main]
    paths:
      - "apps/vela-ext/**"
      - "packages/common/**"
  workflow_dispatch:

env:
  BUN_VERSION: "1.3.1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared packages
        run: bun --cwd packages/common run build

      - name: Build and zip extension
        run: bun --cwd apps/vela-ext run zip

      - name: Get version and zip filename
        id: meta
        run: |
          VERSION=$(jq -r .version apps/vela-ext/package.json)
          ZIP_FILE=$(basename apps/vela-ext/.output/*.zip)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ext-v${{ steps.meta.outputs.version }}-${{ github.run_number }}
          name: Extension v${{ steps.meta.outputs.version }} (#${{ github.run_number }})
          body: "Built from commit ${{ github.sha }}"
          files: apps/vela-ext/.output/*.zip
